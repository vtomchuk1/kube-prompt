apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80
  - name: debian-container
    image: debian
    command: ["/bin/sh", "-c", "while true; do echo hello from debian; sleep 3600; done"]
  - name: redhat-container
    image: fedora
    command: ["/bin/sh", "-c", "while true; do echo hello from redhat-family; sleep 3600; done"]
